services:
  - type: web
    name: travelcopilot-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://your-vercel-domain.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
